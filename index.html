<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://i.imgur.com/doJIzda.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/doJIzda.png">
<meta name="theme-color" content="#0a0a0a">
<title>SOKOTROSKIS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --accent:#00c896;--accent2:#00a878;
  --bg:#0a0a0a;--card:#111111;--card2:#161616;--border:#1f1f1f;
  --text:#efefef;--muted:#666;--green:#00c896;--red:#e05555;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased;}
/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 24px 32px;overflow-y:auto;}
.login-sub{font-size:0.75rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px;}
.login-btn{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px 10px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;user-select:none;}
.login-btn:active{transform:scale(.96);}
.login-btn .lav{width:52px;height:52px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;}
.login-btn .lnm{font-size:1rem;font-weight:700;color:var(--text);}
.login-btn:hover{border-color:var(--accent);background:#0e1a16;}
/* ── HEADER ── */
header{background:#0d0d0d;padding:8px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-brand span{font-size:1.1rem;font-weight:900;letter-spacing:3px;color:var(--accent);}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px;cursor:pointer;transition:border-color .2s;}
.user-chip:hover{border-color:var(--accent);}
.uc-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;}
.uc-name{font-size:.75rem;font-weight:700;color:var(--text);}
/* ── DAY BANNER ── */
.day-banner{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:#0d0d0d;border-bottom:1px solid var(--border);}
.db-label{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.db-title{font-size:1.2rem;font-weight:800;margin-top:3px;color:var(--text);}
.day-badge{background:var(--accent);color:#000;border-radius:8px;padding:5px 12px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;}
/* ── REST VIEW ── */
#restView{padding:16px 16px 90px;}
.rest-hero{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;margin-bottom:12px;}
.rest-big{font-size:3rem;margin-bottom:10px;}
.rest-hero h2{font-size:1.1rem;font-weight:800;margin-bottom:6px;}
.rest-hero p{color:var(--muted);font-size:.82rem;line-height:1.7;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;}
.info-card-title{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:12px;}
.next-row{display:flex;align-items:center;justify-content:space-between;}
.next-name{font-size:1rem;font-weight:800;}
.next-day{font-size:.7rem;color:var(--muted);margin-top:3px;}
.next-emoji{font-size:2rem;}
.ra-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.ra-row:last-child{border:none;}
.ra-person{display:flex;align-items:center;gap:10px;}
.ra-av{width:28px;height:28px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;}
.ra-name{font-size:.83rem;font-weight:600;}
.ra-bar-wrap{flex:1;margin:0 12px;background:var(--border);border-radius:4px;height:3px;}
.ra-bar{height:3px;border-radius:4px;}
.ra-count{font-size:.8rem;font-weight:700;min-width:28px;text-align:right;}
.streak-row{display:flex;justify-content:space-around;padding:4px 0;}
.streak-item{text-align:center;}
.streak-n{font-size:1.6rem;font-weight:900;color:var(--accent);}
.streak-l{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:3px;}
/* ── GYM VIEW ── */
#gymView{padding:16px 16px 90px;}
.section{margin-bottom:20px;}
.section-title{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px;}
.week-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.wday{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 6px;text-align:center;transition:border-color .2s,background .2s;}
.wday.active{border-color:var(--accent);background:#0c1a14;}
.wd-name{font-size:.58rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;}
.wday.active .wd-name{color:var(--accent);}
.wd-emoji{font-size:1.25rem;margin:5px 0;}
.wd-muscle{font-size:.62rem;font-weight:700;color:var(--text);line-height:1.3;}
/* ── ATTENDANCE ── */
.attend-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.pcard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 4px;text-align:center;transition:all .2s;user-select:none;}
.pcard.going{background:#0b1a13;border-color:var(--green);}
.pcard.nope{background:#1a0e0e;border-color:var(--red);opacity:.6;}
.pcard.other{opacity:.5;cursor:default;}
.pavatar{width:40px;height:40px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;background:#1e1e1e;}
.going .pavatar{background:#122018;}.nope .pavatar{background:#1e1010;}
.pname{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.pstatus{font-size:.95rem;margin-top:4px;}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:.6rem;color:var(--muted);margin-left:8px;vertical-align:middle;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sync-dot.syncing{background:#f0a500;animation:pulse .8s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
/* ── VOY BUTTONS ── */
.attend-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.attend-btn{padding:22px 10px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:1.6rem;font-weight:900;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:'Inter',sans-serif;}
.attend-btn span{font-size:.72rem;letter-spacing:1.5px;font-weight:700;}
.attend-btn.going-active{border-color:var(--green);background:#0b1a13;color:#2ecc71;}
.attend-btn.nope-active{border-color:var(--red);background:#1a0e0e;color:var(--red);}
/* ── EX LIST ── */
.day-exercises{margin-top:4px;}
.ex-accordion{background:var(--card);border:1.5px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.ex-accordion-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.ex-accordion-header:active{background:#161616;}
.ex-acc-left{display:flex;align-items:center;gap:10px;}
.ex-acc-name{font-size:.9rem;font-weight:700;}
.ex-acc-reps{font-size:.65rem;color:var(--muted);margin-top:2px;}
.ex-acc-weight{font-size:.78rem;font-weight:700;color:var(--accent);margin-right:8px;}
.ex-acc-weight.empty{color:var(--muted);}
.ex-acc-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.ex-accordion.open .ex-acc-arrow{transform:rotate(180deg);}
.ex-accordion-body{padding:0 16px 14px;display:none;border-top:1px solid var(--border);}
.ex-accordion.open .ex-accordion-body{display:block;}
.ex-body-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.ex-body-row:last-child{border:none;}
.ex-hist-mini{font-size:.7rem;color:var(--muted);}
.ex-hist-mini span{color:var(--text);font-weight:600;}
.weight-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:7px 14px;font-size:.78rem;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.weight-btn.empty{background:var(--card2);border:1.5px dashed var(--border);color:var(--muted);}
.weight-btn:disabled{opacity:.3;cursor:default;}
/* ── PERSON SELECTOR ── */
.person-selector{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.psel-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.7rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif;}
.psel-btn.active{background:#0c1a14;border-color:var(--accent);color:var(--accent);}
/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#141414;border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:24px 20px;width:100%;max-width:520px;transform:translateY(40px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal h3{font-size:1rem;font-weight:800;margin-bottom:4px;}
.modal .msub{font-size:.73rem;color:var(--muted);margin-bottom:16px;}
.weight-input-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.weight-input-row input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:1.3rem;font-weight:800;color:var(--text);text-align:center;font-family:'Inter',sans-serif;}
.weight-input-row input:focus{outline:none;border-color:var(--accent);}
.weight-input-row .unit{color:var(--muted);font-size:.85rem;font-weight:700;min-width:28px;}
.mhist-title{font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.hist-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:.77rem;}
.hist-row:last-child{border:none;}.hist-date{color:var(--muted);}.hist-w{font-weight:700;color:var(--accent);}
.btn-save{background:var(--accent);border:none;border-radius:12px;padding:13px;width:100%;color:#000;font-size:.92rem;font-weight:800;cursor:pointer;letter-spacing:.5px;font-family:'Inter',sans-serif;}
.btn-cancel{background:none;border:none;color:var(--muted);font-size:.78rem;cursor:pointer;width:100%;padding:8px;margin-top:4px;font-family:'Inter',sans-serif;}
/* ── PAGES ── */
.page-inner{padding:16px 16px 90px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-n{font-size:1.7rem;font-weight:900;color:var(--accent);}
.stat-l{font-size:.58rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:4px;}
/* ── NAV ── */
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#0d0d0d;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 16px;z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 14px;border-radius:8px;}
.nav-item.active .nav-icon{color:var(--accent);}
.nav-item:not(.active) .nav-icon{color:#333;}
.nav-item.active .nav-label{color:var(--accent);}
.nav-item:not(.active) .nav-label{color:#444;}
.nav-icon{font-size:1.2rem;}.nav-label{font-size:.55rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
/* ── UTILS ── */
.hidden{display:none!important;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.loading .spin{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#161616;border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:.78rem;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}.toast.ok{border-color:var(--green);color:var(--green);}.toast.err{border-color:var(--red);color:var(--red);}
/* ── RUTINA ── */
.rut-day-block{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.rut-day-header{padding:13px 16px;background:#0d0d0d;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.rut-day-left{display:flex;align-items:center;gap:10px;}
.rut-day-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.rut-day-block.open .rut-day-arrow{transform:rotate(180deg);}
.rut-day-body{padding:10px 16px 14px;display:none;}
.rut-day-block.open .rut-day-body{display:block;}
.rut-ex-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.8rem;align-items:center;}
.rut-ex-row:last-child{border:none;}

/* ── HISTORIAL — GRUPOS DE EJERCICIOS ── */
.ex-groups-wrap{margin-bottom:14px;}
.ex-group{margin-bottom:10px;}
.ex-group-label{display:flex;align-items:center;gap:6px;font-size:.55rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.ex-group-label .eg-emoji{font-size:.85rem;}
.ex-group-pills{display:flex;flex-wrap:wrap;gap:6px;}
.ex-tab{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.63rem;font-weight:700;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .15s;font-family:'Inter',sans-serif;line-height:1.3;}
.ex-tab.active{background:#0c1a14;border-color:var(--accent);color:var(--accent);}
.ex-tab:hover:not(.active){border-color:#333;color:var(--text);}

/* ── CHART ── */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px 16px;margin-bottom:12px;}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.chart-ex-name{font-size:.95rem;font-weight:800;}
.chart-ex-sub{font-size:.62rem;color:var(--muted);margin-top:3px;}
.chart-pr{background:#0c1a14;color:var(--accent);font-size:.7rem;font-weight:800;padding:5px 10px;border-radius:8px;text-align:right;}
.chart-pr-label{font-size:.55rem;color:var(--muted);display:block;margin-bottom:1px;}
.chart-wrap{position:relative;width:100%;}
svg.linechart{width:100%;overflow:visible;}
.chart-tooltip{position:absolute;background:#1a1a1a;border:1px solid var(--accent);border-radius:8px;padding:7px 10px;font-size:.7rem;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;z-index:10;}
.chart-tooltip .tt-date{color:var(--muted);font-size:.6rem;}
.chart-tooltip .tt-weight{color:var(--accent);font-weight:800;font-size:.88rem;}
.chart-tooltip .tt-delta{font-size:.62rem;margin-top:2px;}
.chart-empty{text-align:center;padding:30px 20px;color:var(--muted);font-size:.82rem;}
.chart-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;}
.chart-mini-stat{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.chart-mini-stat-n{font-size:1.2rem;font-weight:900;color:var(--accent);}
.chart-mini-stat-l{font-size:.55rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:3px;}
.hist-list{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.hist-list-title{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px;}
.hist-entry{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);}
.hist-entry:last-child{border:none;}
.hist-entry-date{font-size:.75rem;color:var(--muted);}
.hist-entry-weight{font-size:.82rem;font-weight:700;}
.hist-entry-delta{font-size:.68rem;font-weight:700;padding:2px 6px;border-radius:4px;}
.delta-up{background:#0c2018;color:#2ecc71;}
.delta-down{background:#1e0e0e;color:#e05555;}
.delta-eq{background:#1a1a1a;color:var(--muted);}
</style>
</head>
<body>

<div id="loginScreen">
  <img src="https://i.imgur.com/doJIzda.png" style="width:140px;height:140px;border-radius:28px;margin-bottom:8px;margin-top:12px;">
  <div class="login-sub">Seleccioná tu perfil</div>
  <div class="login-grid" id="loginGrid"></div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="header-brand">
      <img src="https://i.imgur.com/3VSDcxC.jpeg" style="height:28px;border-radius:50%;">
      <span>SOKOTROSKIS</span>
    </div>
    <div class="user-chip" onclick="logout()">
      <div class="uc-av" id="ucAv"></div>
      <span class="uc-name" id="ucName"></span>
    </div>
  </header>
  <div class="day-banner" id="dayBanner"></div>
  <div id="restView" class="hidden"></div>
  <div id="gymView" class="hidden">
    <div class="section" style="padding:16px 16px 0">
      <div class="section-title">Esta semana</div>
      <div class="week-strip" id="weekStrip"></div>
    </div>
    <div style="padding:0 16px">
      <div class="section" style="margin-top:20px">
        <div class="section-title">¿Vas hoy? <span class="sync-badge"><span class="sync-dot" id="syncDot"></span><span id="syncTxt">sincronizado</span></span></div>
        <div id="myAttend"></div>
        <div class="section-title" style="margin-top:4px">El grupo</div>
        <div class="attend-grid" id="attendGrid"></div>
      </div>
     <div class="section">
        <div class="section-title">Ejercicios de hoy</div>
        <div class="day-exercises" id="dayExList"></div>
      </div>
      <div class="section">
        <div class="section-title">Mi peso corporal</div>
        <div id="bodyWeightCard"></div>
      </div>
    </div>
  </div>
  <div id="pageRutina" class="hidden"><div class="page-inner"><div class="section-title">Rutina completa</div><div id="rutinaFull"></div></div></div>
  <div id="pageHistorial" class="hidden">
    <div class="page-inner">
      <div class="section-title">Progresión de pesos</div>
      <div class="person-selector" id="histPersonSelector"></div>
      <div class="ex-groups-wrap" id="histExGroups"></div>
      <div id="histChartArea"></div>
    </div>
  </div>
  <div id="pageStats" class="hidden"><div class="page-inner"><div class="section-title">Estadísticas del grupo</div><div class="stats-grid" id="statsGrid" style="margin-bottom:20px"></div><div class="section-title">Asistencia por persona</div><div id="attendStats"></div></div></div>
</div>

<nav class="nav-bar hidden" id="navBar">
  <div class="nav-item active" data-page="hoy" onclick="switchPage(this)"><span class="nav-icon">🏠</span><span class="nav-label">Hoy</span></div>
  <div class="nav-item" data-page="pageRutina" onclick="switchPage(this)"><span class="nav-icon">📅</span><span class="nav-label">Rutina</span></div>
  <div class="nav-item" data-page="pageHistorial" onclick="switchPage(this)"><span class="nav-icon">📈</span><span class="nav-label">Historial</span></div>
  <div class="nav-item" data-page="pageStats" onclick="switchPage(this)"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></div>
</nav>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalExName"></h3>
    <div class="msub" id="modalExSeries"></div>
    <div class="weight-input-row">
      <input type="number" id="weightInput" placeholder="0" min="0" step="0.5"/>
      <span class="unit" id="weightUnit">kg</span>
    </div>
    <div id="modalHist"></div>
    <button class="btn-save" onclick="saveWeight()">Guardar</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbzPtXxxYOsjXCsnLR6ApckENIEghkiKC6hKwwqg9aWSusBbofi_T7yl8jN9gLFdQXri/exec';
const PERSONS=['Fede','Toti','Matu','Pepo','Jordan'];
const PI={Fede:'F',Toti:'T',Matu:'M',Pepo:'P',Jordan:'J'};
const COLORS={Fede:'#00c896',Toti:'#5b9cf6',Matu:'#a78bfa',Pepo:'#f59e0b',Jordan:'#f472b6'};
const ROUTINE={
  Lunes:{emoji:'🦵',muscle:'Piernas',exercises:[
    {name:'Extensión de cuádricep',repsMin:12,repsMax:15},
    {name:'Sentadilla Hack',repsMin:8,repsMax:12},
    {name:'Prensa',repsMin:8,repsMax:12},
    {name:'Sillón femoral',repsMin:8,repsMax:12},
    {name:'Gemelos',repsMin:15,repsMax:20},
  ]},
  Martes:{emoji:'😴',muscle:'Descanso',exercises:[]},
  Miercoles:{emoji:'💪',muscle:'Pecho & Bícep',exercises:[
    {name:'Press inclinado',repsMin:8,repsMax:12},
    {name:'Press banca',repsMin:8,repsMax:12},
    {name:'Peck deck',repsMin:8,repsMax:12},
    {name:'Curl con mancuernas',repsMin:8,repsMax:12},
    {name:'Curl martillo',repsMin:8,repsMax:12},
    {name:'Curl inclinado / concentrado',repsMin:8,repsMax:12},
  ]},
  Jueves:{emoji:'🔙',muscle:'Espalda & Trícep',exercises:[
    {name:'Jalón al pecho (polea)',repsMin:8,repsMax:12},
    {name:'Remo con polea',repsMin:8,repsMax:12},
    {name:'Remo en T',repsMin:8,repsMax:12},
    {name:'Dominadas',type:'record'},
    {name:'Extensión trícep polea ↓',repsMin:8,repsMax:12},
    {name:'Extensión trícep polea ↑',repsMin:8,repsMax:12},
    {name:'Trícep tras nuca (mancuerna)',repsMin:8,repsMax:12},
  ]},
  Viernes:{emoji:'🔝',muscle:'Hombro',exercises:[
    {name:'Press militar',repsMin:8,repsMax:12},
    {name:'Elevaciones laterales',repsMin:8,repsMax:12},
    {name:'Elevaciones frontales',repsMin:8,repsMax:12},
    {name:'Peck deck invertido',repsMin:8,repsMax:12},
  ]},
  Sabado:{emoji:'😴',muscle:'Descanso',exercises:[]},
  Domingo:{emoji:'😴',muscle:'Descanso',exercises:[]},
};
const DAY_NAMES=['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
const GYM_DAYS=['Lunes','Miercoles','Jueves','Viernes'];
const ALL_EXERCISES=[];
GYM_DAYS.forEach(d=>ROUTINE[d].exercises.forEach(e=>{if(!ALL_EXERCISES.find(x=>x.name===e.name))ALL_EXERCISES.push({...e,day:d});}));

let cache={asistencia:null,pesos:{},records:[]};
let ME=localStorage.getItem('sokoUser')||null;
let selP=ME;
const today=new Date();
const todayDay=DAY_NAMES[today.getDay()];
const todayStr=today.toLocaleDateString('en-CA');
const isRest=!ROUTINE[todayDay]||ROUTINE[todayDay].exercises.length===0;
let histP=null,histEx=null;

async function api(params){
  const url=API+'?'+new URLSearchParams(params).toString();
  const res=await fetch(url);return res.json();
}
function setSyncStatus(s){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');
  if(!dot)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'sincronizando...':s==='error'?'sin conexión':'sincronizado';
}
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),2500);
}
function buildLogin(){
  const g=document.getElementById('loginGrid');g.innerHTML='';
  PERSONS.forEach(p=>{
    const b=document.createElement('div');b.className='login-btn';
    b.innerHTML=`<div class="lav" style="background:${COLORS[p]}22;color:${COLORS[p]}">${PI[p]}</div><div class="lnm">${p}</div>`;
    b.onclick=()=>login(p);g.appendChild(b);
  });
}
function login(p){
  ME=p;localStorage.setItem('sokoUser',p);selP=p;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('navBar').classList.remove('hidden');
  initApp();
}
function logout(){
  if(!confirm('¿Cambiar de usuario?'))return;
  localStorage.removeItem('sokoUser');ME=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('navBar').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}
function initApp(){
  cache={asistencia:null,pesos:{},records:[]};selP=ME;histP=ME;histEx=null;
  const av=document.getElementById('ucAv');
  av.textContent=PI[ME];av.style.background=COLORS[ME];av.style.color='#000';
  document.getElementById('ucName').textContent=ME;
  renderBanner();showPage('hoy');
}
function renderBanner(){
  const r=ROUTINE[todayDay],el=document.getElementById('dayBanner');
  const dateStr=today.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
  if(isRest){
    el.innerHTML=`<div><div class="db-label">${dateStr}</div><div class="db-title">😴 Día de descanso</div></div>`;
  }else{
    const idx=GYM_DAYS.indexOf(todayDay)+1;
    el.innerHTML=`<div><div class="db-label">${dateStr}</div><div class="db-title">${r.emoji} ${r.muscle}</div></div><div class="day-badge">DÍA ${idx} DE 4</div>`;
  }
}
async function buildRestDay(){
  const ti=DAY_NAMES.indexOf(todayDay);let next=null;
  for(let i=1;i<=7;i++){const d=DAY_NAMES[(ti+i)%7];if(GYM_DAYS.includes(d)){next=d;break;}}
  const month=todayStr.slice(0,7);
  let cnt={};PERSONS.forEach(p=>{cnt[p]=0;});
  try{
    const data=await api({action:'getAsistenciaMes',mes:month});
    if(Array.isArray(data))data.forEach(row=>PERSONS.forEach(p=>{if(row[p.toLowerCase()]===1||row[p.toLowerCase()]==='1')cnt[p]++;}));
  }catch(e){}
  const maxCnt=Math.max(1,...Object.values(cnt));
  const totalDays=Math.max(1,...Object.values(cnt));
  document.getElementById('restView').innerHTML=`
    <div class="rest-hero"><div class="rest-big">💤</div><h2>Día de descanso</h2><p>El músculo crece cuando descansás.<br>Hoy toca recuperar, mañana volvemos con todo.</p></div>
    ${next?`<div class="info-card"><div class="info-card-title">Próximo entrenamiento</div><div class="next-row"><div><div class="next-name">${ROUTINE[next].muscle}</div><div class="next-day">${next}</div></div><div class="next-emoji">${ROUTINE[next].emoji}</div></div></div>`:''}
    <div class="info-card"><div class="info-card-title">Asistencia del grupo — ${today.toLocaleDateString('es-AR',{month:'long'})}</div>
      ${PERSONS.map(p=>`<div class="ra-row"><div class="ra-person"><div class="ra-av" style="color:${COLORS[p]}">${PI[p]}</div><div class="ra-name">${p}${p===ME?' ●':''}</div></div><div class="ra-bar-wrap"><div class="ra-bar" style="width:${Math.round(cnt[p]/maxCnt*100)}%;background:${COLORS[p]}"></div></div><div class="ra-count" style="color:${COLORS[p]}">${cnt[p]}</div></div>`).join('')}
    </div>
<div class="info-card"><div class="info-card-title">Tu mes, ${ME}</div><div class="streak-row">
      <div class="streak-item"><div class="streak-n">${cnt[ME]}</div><div class="streak-l">Sesiones</div></div>
      <div class="streak-item"><div class="streak-n">${Math.round(cnt[ME]/totalDays*100)}%</div><div class="streak-l">Asistencia</div></div>
      <div class="streak-item"><div class="streak-n">${[...PERSONS].sort((a,b)=>cnt[b]-cnt[a]).indexOf(ME)+1}°</div><div class="streak-l">Ranking</div></div>
</div></div>
    <div id="bodyWeightCardRest" style="margin-top:2px"></div>`;
  setTimeout(()=>buildBodyWeightCard('bodyWeightCardRest'),100);
}
function buildWeekStrip(){
  const el=document.getElementById('weekStrip');el.innerHTML='';
  GYM_DAYS.forEach(d=>{
    const r=ROUTINE[d],div=document.createElement('div');
    div.className='wday'+(d===todayDay?' active':'');
    div.innerHTML=`<div class="wd-name">${d.slice(0,3)}</div><div class="wd-emoji">${r.emoji}</div><div class="wd-muscle">${r.muscle}</div>`;
    el.appendChild(div);
  });
}
async function setAttendance(valor){
  setSyncStatus('syncing');
  if(!cache.asistencia)cache.asistencia={};
  const current=cache.asistencia[ME.toLowerCase()];
  const newVal=(current===valor||current===String(valor))?null:valor;
  cache.asistencia[ME.toLowerCase()]=newVal;
  renderAttendance();
  try{
    await api({action:'setAsistencia',fecha:todayStr,dia_semana:todayDay,musculo:ROUTINE[todayDay].muscle,persona:ME,valor:newVal===null?-1:newVal});
    setSyncStatus('ok');
    showToast(newVal===1?'✅ ¡Vas hoy!':newVal===0?'❌ No vas hoy':'↩️ Desmarcado',newVal===1?'ok':'err');
  }catch(e){setSyncStatus('error');showToast('Error al guardar','err');}
}
async function buildAttendance(){
  setSyncStatus('syncing');
  try{const data=await api({action:'getAsistencia',fecha:todayStr});cache.asistencia=data;setSyncStatus('ok');}
  catch(e){setSyncStatus('error');}
  renderAttendance();
}
function renderAttendance(){
  const d=cache.asistencia||{};
  const val=d[ME.toLowerCase()];
  const v=val===1||val==='1'?true:val===0||val==='0'?false:null;
  document.getElementById('myAttend').innerHTML=`
    <div class="attend-btns">
      <button class="attend-btn ${v===true?'going-active':''}" onclick="setAttendance(1)">✅<span>VOY</span></button>
      <button class="attend-btn ${v===false?'nope-active':''}" onclick="setAttendance(0)">❌<span>NO VOY</span></button>
    </div>`;
  const grid=document.getElementById('attendGrid');grid.innerHTML='';
  PERSONS.forEach(p=>{
    const pval=d[p.toLowerCase()];
    const pv=pval===1||pval==='1'?true:pval===0||pval==='0'?false:null;
    const isMe=p===ME;
    const card=document.createElement('div');
    card.className='pcard'+(pv===true?' going':pv===false?' nope':'')+(isMe?' me':' other');
    card.innerHTML=`<div class="pavatar" style="color:${COLORS[p]};${isMe?'outline:2px solid '+COLORS[p]+';outline-offset:2px':''}">${PI[p]}</div><div class="pname">${p}</div><div class="pstatus">${pv===true?'✅':pv===false?'❌':'❓'}</div>`;
    grid.appendChild(card);
  });
}
async function buildDayExList(){
  const el=document.getElementById('dayExList');if(!el)return;
  const r=ROUTINE[todayDay];
  if(!r||!r.exercises.length){el.innerHTML='';return;}
  await loadPesosParaPerson(ME);
  if(!cache.records)await loadRecords();
  el.innerHTML='';
  r.exercises.forEach((ex,i)=>{
    const isRec=ex.type==='record';
    const w=isRec?null:getPesoHoy(ME,ex.name);
    const pr=(cache.records||[]).find(r=>r.persona.toLowerCase()===ME.toLowerCase()&&r.ejercicio===ex.name);
    const histEntries=isRec?[]:getPesoHistorial(ME,ex.name);
    const lastPrev=histEntries.find(e=>e.fecha!==todayStr);
    const repsLabel=isRec?'lo que te dé 😤':`${ex.repsMin}-${ex.repsMax} reps`;
    const weightLabel=isRec?(pr?`🏆 ${pr.valor} reps`:'Sin récord'):(w?`${w} kg`:'+ Peso');
    const weightClass=w||pr?'':'empty';
    const acc=document.createElement('div');acc.className='ex-accordion';acc.id=`exacc-${i}`;
    acc.innerHTML=`
      <div class="ex-accordion-header" onclick="toggleAcc(${i})">
        <div class="ex-acc-left"><div>
          <div class="ex-acc-name">${isRec?'🏆 ':''} ${ex.name}</div>
          <div class="ex-acc-reps">${repsLabel}</div>
        </div></div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="ex-acc-weight ${weightClass}">${weightLabel}</span>
          <span class="ex-acc-arrow">▼</span>
        </div>
      </div>
      <div class="ex-accordion-body">
        <div class="ex-body-row">
          <div class="ex-hist-mini">${lastPrev?`Última vez: <span>${lastPrev.peso_kg} kg</span> (${lastPrev.fecha})`:(pr?`Récord actual: <span>${pr.valor} reps</span>`:'Sin historial previo')}</div>
          <button class="weight-btn ${weightClass}" onclick='openModal(${JSON.stringify(ex)})'>${isRec?(pr?'Actualizar':'Marcar récord'):(w?`Editar (${w} kg)`:'Cargar peso')}</button>
        </div>
        ${!isRec&&histEntries.length>1?`<div style="margin-top:8px">${histEntries.slice(0,3).map(e=>`<div class="hist-row"><span class="hist-date">${e.fecha}</span><span class="hist-w">${e.peso_kg} kg</span></div>`).join('')}</div>`:''}
      </div>`;
    el.appendChild(acc);
  });
}
function toggleAcc(i){document.getElementById(`exacc-${i}`).classList.toggle('open');}
async function loadPesosParaPerson(persona){
  if(cache.pesos[persona])return;
  try{const data=await api({action:'getPesos',persona});cache.pesos[persona]=data||[];}
  catch(e){cache.pesos[persona]=[];}
}
function getPesoHoy(persona,ejercicio){
  const rows=cache.pesos[persona]||[];
  const row=rows.find(r=>r.fecha===todayStr&&r.ejercicio===ejercicio);
  return row?row.peso_kg:null;
}
function getPesoHistorial(persona,ejercicio){
  const rows=cache.pesos[persona]||[];
  return rows.filter(r=>r.ejercicio===ejercicio).sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,30);
}
let modalEx=null;
function openModal(ex){
  modalEx=ex;
  const isRec=ex.type==='record';
  document.getElementById('modalExName').textContent=ex.name;
  document.getElementById('modalExSeries').textContent=isRec?'Récord de repeticiones — lo que te dé 😤':`${ex.repsMin}-${ex.repsMax} reps`;
  document.getElementById('weightUnit').textContent=isRec?'reps':'kg';
  document.getElementById('weightInput').value=isRec?((cache.records||[]).find(r=>r.persona.toLowerCase()===ME.toLowerCase()&&r.ejercicio===ex.name)?.valor||''):(getPesoHoy(ME,ex.name)||'');
  const hist=document.getElementById('modalHist');
  if(isRec){hist.innerHTML='';}
  else{
    const entries=getPesoHistorial(ME,ex.name);
    hist.innerHTML=entries.length?`<div class="mhist-title">Tu historial</div>`+entries.slice(0,4).map(e=>`<div class="hist-row"><span class="hist-date">${e.fecha}</span><span class="hist-w">${e.peso_kg} kg</span></div>`).join(''):'<div class="mhist-title" style="margin-bottom:0">Sin historial aún</div>';
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('weightInput').focus(),200);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');modalEx=null;}
async function saveWeight(){
  const val=parseFloat(document.getElementById('weightInput').value);
  if(!val||isNaN(val)){closeModal();return;}
  const isRec=modalEx.type==='record';
  const exCopy={...modalEx};
  closeModal();
  try{
    if(isRec){
      const res=await api({action:'setRecord',persona:ME,ejercicio:exCopy.name,valor:val,fecha:todayStr});
      if(res.nuevo_record){showToast('🏆 ¡Nuevo récord! '+val+' reps','ok');cache.records=null;await loadRecords();}
      else showToast('Récord actual: '+res.valor+' reps');
    }else{
      await api({action:'setPeso',persona:ME,ejercicio:exCopy.name,peso_kg:val,fecha:todayStr,series:3,reps_min:exCopy.repsMin,reps_max:exCopy.repsMax});
      if(!cache.pesos[ME])cache.pesos[ME]=[];
      const idx=cache.pesos[ME].findIndex(r=>r.fecha===todayStr&&r.ejercicio===exCopy.name);
      if(idx>=0)cache.pesos[ME][idx].peso_kg=val;
      else cache.pesos[ME].push({fecha:todayStr,persona:ME,ejercicio:exCopy.name,peso_kg:val});
      showToast('💾 Guardado: '+val+' kg','ok');
    }
    buildDayExList();
    buildBodyWeightCard('bodyWeightCard');
    buildBodyWeightCard('bodyWeightCardRest');
  }catch(e){showToast('Error: '+e.message,'err');console.error(e);}
}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
async function loadRecords(){
  try{cache.records=await api({action:'getRecords'});}catch(e){cache.records=[];}
}
function buildRutinaPage(){
  const el=document.getElementById('rutinaFull');el.innerHTML='';
  GYM_DAYS.forEach((day,di)=>{
    const r=ROUTINE[day];
    const b=document.createElement('div');
    b.className='rut-day-block'+(day===todayDay?' open':'');b.id=`rutday-${di}`;
    b.innerHTML=`
      <div class="rut-day-header" onclick="toggleRutDay(${di})">
        <div class="rut-day-left">
          <span style="font-size:1.3rem">${r.emoji}</span>
          <div>
            <div style="font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:700">${day}</div>
            <div style="font-size:.95rem;font-weight:800;margin-top:1px">${r.muscle}</div>
          </div>
        </div>
        <span class="rut-day-arrow">▼</span>
      </div>
      <div class="rut-day-body">
        ${r.exercises.map(ex=>`<div class="rut-ex-row"><span>${ex.type==='record'?'🏆 ':''} ${ex.name}</span><span style="color:var(--muted);font-size:.7rem">${ex.type==='record'?'lo que te dé 😤':ex.repsMin+'-'+ex.repsMax+' reps'}</span></div>`).join('')}
      </div>`;
    el.appendChild(b);
  });
}
function toggleRutDay(i){document.getElementById(`rutday-${i}`).classList.toggle('open');}

/* ── HISTORIAL CON GRÁFICO AGRUPADO ── */
async function buildHistPage(){
  if(!histP)histP=ME;

  // Selector de persona
  const sel=document.getElementById('histPersonSelector');sel.innerHTML='';
  PERSONS.forEach(p=>{
    const b=document.createElement('div');b.className='psel-btn'+(p===histP?' active':'');
    b.textContent=p+(p===ME?' ★':'');
    b.onclick=async()=>{histP=p;cache.pesos[p]=null;histEx=null;await buildHistPage();};
    sel.appendChild(b);
  });

  document.getElementById('histChartArea').innerHTML='<div class="loading"><span class="spin">⏳</span>Cargando...</div>';

  await loadPesosParaPerson(histP);
  if(!cache.records)await loadRecords();

  // Construir grupos con datos
  const groupsEl=document.getElementById('histExGroups');groupsEl.innerHTML='';

  // Función auxiliar para saber si un ejercicio tiene datos
  const hasData=ex=>{
    if(ex.type==='record')return(cache.records||[]).some(r=>r.persona.toLowerCase()===histP.toLowerCase()&&r.ejercicio===ex.name);
    return getPesoHistorial(histP,ex.name).length>0;
  };

  // Todos los ejercicios con datos para esta persona
  const allWithData=ALL_EXERCISES.filter(hasData);
  if(!histEx||!allWithData.find(e=>e.name===histEx))histEx=allWithData.length?allWithData[0].name:null;

  if(allWithData.length===0){
    groupsEl.innerHTML='';
    document.getElementById('histChartArea').innerHTML=`<div class="chart-empty"><div style="font-size:2rem;margin-bottom:8px">📭</div>Sin datos para ${histP} todavía.<br>¡Empezá a cargar pesos!</div>`;
    return;
  }

  // Renderizar grupos por día de gym
  GYM_DAYS.forEach(day=>{
    const r=ROUTINE[day];
    const dayExWithData=r.exercises.filter(hasData);
    if(!dayExWithData.length)return;

    const group=document.createElement('div');
    group.className='ex-group';

    const label=document.createElement('div');
    label.className='ex-group-label';
    label.innerHTML=`<span class="eg-emoji">${r.emoji}</span>${r.muscle}`;
    group.appendChild(label);

    const pills=document.createElement('div');
    pills.className='ex-group-pills';

    dayExWithData.forEach(ex=>{
      const btn=document.createElement('button');
      btn.className='ex-tab'+(ex.name===histEx?' active':'');
      btn.textContent=(ex.type==='record'?'🏆 ':'')+ex.name;
      btn.onclick=()=>{
        histEx=ex.name;
        document.querySelectorAll('.ex-tab').forEach(t=>t.classList.remove('active'));
        btn.classList.add('active');
        renderHistChart(histP,histEx);
      };
      pills.appendChild(btn);
    });

    group.appendChild(pills);
    groupsEl.appendChild(group);
  });

  renderHistChart(histP,histEx);
}

function renderHistChart(persona,ejercicio){
  const area=document.getElementById('histChartArea');
  const personColor=COLORS[persona];
  const chartColor='#00c896'; // siempre verde fluor para la línea
  const exObj=ALL_EXERCISES.find(e=>e.name===ejercicio);
  const isRec=exObj&&exObj.type==='record';
  if(isRec){
    const pr=(cache.records||[]).find(r=>r.persona.toLowerCase()===persona.toLowerCase()&&r.ejercicio===ejercicio);
    area.innerHTML=`<div class="chart-card"><div class="chart-header"><div><div class="chart-ex-name">🏆 ${ejercicio}</div><div class="chart-ex-sub" style="color:${personColor}">${persona}</div></div><div class="chart-pr"><span class="chart-pr-label">Récord</span>${pr?pr.valor+' reps':'—'}</div></div><div class="chart-empty" style="padding:20px 0">Récord personal: <strong style="color:${chartColor}">${pr?pr.valor+' reps':'Sin datos'}</strong></div></div>`;
    return;
  }
  const data=getPesoHistorial(persona,ejercicio).slice().reverse();
  if(data.length===0){area.innerHTML=`<div class="chart-empty">Sin datos para este ejercicio</div>`;return;}
  const pr=Math.max(...data.map(d=>+d.peso_kg));
  const gain=+(+data[data.length-1].peso_kg - +data[0].peso_kg).toFixed(1);
  let chartHtml='';
  if(data.length>=2){
    const W=320,H=120,PL=36,PR=10,PT=10,PB=24;
    const cW=W-PL-PR,cH=H-PT-PB;
    const ws=data.map(d=>+d.peso_kg);
    const mn=Math.min(...ws)-5,mx=Math.max(...ws)+5;
    const xS=i=>(i/(data.length-1))*cW;
    const yS=w=>cH-((w-mn)/(mx-mn))*cH;
    const pts=data.map((d,i)=>({x:xS(i)+PL,y:yS(+d.peso_kg)+PT}));
    const line=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
    const fill=`${line} L${pts[pts.length-1].x},${H-PB+PT} L${pts[0].x},${H-PB+PT} Z`;
    const yLabs=[mn+5,Math.round((mn+mx)/2),mx-5];
    const xLabs=[data[0],data[Math.floor(data.length/2)],data[data.length-1]].filter((v,i,a)=>a.findIndex(x=>x.fecha===v.fecha)===i);
    chartHtml=`<div class="chart-wrap" id="chartWrap">
      <svg class="linechart" viewBox="0 0 ${W} ${H}" id="chartSvg">
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${chartColor}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${chartColor}" stop-opacity="0.02"/>
        </linearGradient></defs>
        ${yLabs.map(v=>`<line x1="${PL}" y1="${yS(v)+PT}" x2="${W-PR}" y2="${yS(v)+PT}" stroke="#1f1f1f" stroke-width="1"/><text x="${PL-4}" y="${yS(v)+PT+4}" text-anchor="end" font-size="8" fill="#444">${v.toFixed(0)}</text>`).join('')}
        ${xLabs.map(d=>{const idx=data.findIndex(x=>x.fecha===d.fecha);return`<text x="${xS(idx)+PL}" y="${H-2}" text-anchor="middle" font-size="8" fill="#444">${d.fecha.slice(5)}</text>`}).join('')}
        <path d="${fill}" fill="url(#ag)"/>
        <path d="${line}" fill="none" stroke="${chartColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="${i===pts.length-1?4:3}" fill="${i===pts.length-1?chartColor:'#111'}" stroke="${chartColor}" stroke-width="1.5" class="dot" data-i="${i}" style="cursor:pointer"/>`).join('')}
        ${(()=>{const pi=data.findIndex(d=>+d.peso_kg===pr);const pp=pts[pi];return`<circle cx="${pp.x}" cy="${pp.y}" r="6" fill="none" stroke="${chartColor}" stroke-width="1" opacity="0.4"/>`;})()}
      </svg>
      <div class="chart-tooltip" id="chartTip"></div>
    </div>`;
  } else {
    chartHtml=`<div style="text-align:center;padding:14px 0;font-size:.78rem;color:var(--muted)">Solo 1 registro — seguí cargando para ver la curva 📈</div>`;
  }
  area.innerHTML=`<div class="chart-card">
    <div class="chart-header">
      <div><div class="chart-ex-name">${ejercicio}</div><div class="chart-ex-sub" style="color:${personColor}">${persona}</div></div>
      <div class="chart-pr"><span class="chart-pr-label">Récord</span>${pr} kg</div>
    </div>
    ${chartHtml}
    <div class="chart-stats-row">
      <div class="chart-mini-stat"><div class="chart-mini-stat-n">${data.length}</div><div class="chart-mini-stat-l">Sesiones</div></div>
      <div class="chart-mini-stat"><div class="chart-mini-stat-n" style="color:${gain>=0?'#2ecc71':'#e05555'}">${gain>=0?'+':''}${gain} kg</div><div class="chart-mini-stat-l">Progreso</div></div>
      <div class="chart-mini-stat"><div class="chart-mini-stat-n">${pr} kg</div><div class="chart-mini-stat-l">Récord</div></div>
    </div>
    <div class="hist-list">
      <div class="hist-list-title">Historial</div>
      ${[...data].reverse().map((d,i,arr)=>{
        const prev=arr[i+1];
        const delta=prev?(+(+d.peso_kg - +prev.peso_kg).toFixed(1)):null;
        const dc=delta===null?'':delta>0?'delta-up':delta<0?'delta-down':'delta-eq';
        const ds=delta===null?'':(delta>0?`+${delta} kg`:delta<0?`${delta} kg`:'=');
        return`<div class="hist-entry"><span class="hist-entry-date">${d.fecha}</span><div style="display:flex;align-items:center;gap:8px">${prev?`<span class="hist-entry-delta ${dc}">${ds}</span>`:''}<span class="hist-entry-weight">${d.peso_kg} kg</span></div></div>`;
      }).join('')}
    </div>
  </div>`;
  if(data.length>=2){
    const svg=document.getElementById('chartSvg'),tip=document.getElementById('chartTip'),wrap=document.getElementById('chartWrap');
    svg.querySelectorAll('.dot').forEach(dot=>{
      const show=idx=>{
        const d=data[idx],prev=data[idx+1];
        const delta=prev?(+(+d.peso_kg - +prev.peso_kg).toFixed(1)):null;
        const dh=delta!==null?`<div class="tt-delta" style="color:${delta>=0?'#2ecc71':'#e05555'}">${delta>=0?'+':''}${delta} kg vs anterior</div>`:'';
        tip.innerHTML=`<div class="tt-date">${d.fecha}</div><div class="tt-weight">${d.peso_kg} kg</div>${dh}`;
        const wr=wrap.getBoundingClientRect(),dr=dot.getBoundingClientRect();
        let l=dr.left-wr.left-40,t=dr.top-wr.top-62;
        if(l<0)l=0;if(l>wr.width-120)l=wr.width-120;
        tip.style.left=l+'px';tip.style.top=t+'px';tip.style.opacity='1';
      };
      dot.addEventListener('mouseenter',()=>show(+dot.dataset.i));
      dot.addEventListener('mouseleave',()=>tip.style.opacity='0');
      dot.addEventListener('click',()=>{show(+dot.dataset.i);setTimeout(()=>tip.style.opacity='0',2000);});
    });
  }
}
  async function buildBodyWeightCard(targetId='bodyWeightCard'){
  const el=document.getElementById(targetId);if(!el)return;
  await loadPesosParaPerson(ME);
  const BW_EX={name:'Peso corporal',type:'body_weight',repsMin:null,repsMax:null};
  const hist=getPesoHistorial(ME,'Peso corporal');
  const hoy=getPesoHoy(ME,'Peso corporal');
  const last=hist.find(e=>e.fecha!==todayStr);
  const delta=hoy&&last?(+(+hoy - +last.peso_kg).toFixed(1)):null;
  const dc=delta===null?'':delta>0?'delta-up':delta<0?'delta-down':'delta-eq';
  const ds=delta===null?'':(delta>0?`+${delta} kg`:delta<0?`${delta} kg`:'=');
  el.innerHTML=`<div class="info-card">
    <div class="info-card-title">Peso corporal — ${ME}</div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:2rem;font-weight:900;color:var(--accent)">${hoy?hoy+' kg':'—'}</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:4px">${last?'Antes: '+last.peso_kg+' kg ('+last.fecha+')':'Sin registros previos'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        ${delta!==null?`<span class="hist-entry-delta ${dc}">${ds}</span>`:''}
        <button class="weight-btn ${hoy?'':'empty'}" onclick='openModal(${JSON.stringify(BW_EX)})'>${hoy?'Editar ('+hoy+' kg)':'+ Registrar'}</button>
      </div>
    </div>
    ${hist.length>1?`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">${hist.slice(0,4).map(e=>`<div class="hist-row"><span class="hist-date">${e.fecha}</span><span class="hist-w">${e.peso_kg} kg</span></div>`).join('')}</div>`:''}
  </div>`;
}

async function buildStatsPage(){
  document.getElementById('statsGrid').innerHTML='<div class="loading" style="grid-column:1/-1"><span class="spin">⏳</span></div>';
  try{
    const month=todayStr.slice(0,7);
    const data=await api({action:'getAsistenciaMes',mes:month});
    const cnt={};PERSONS.forEach(p=>{cnt[p]=0;});
    if(Array.isArray(data))data.forEach(row=>PERSONS.forEach(p=>{if(row[p.toLowerCase()]===1||row[p.toLowerCase()]==='1')cnt[p]++;}));
    const totalDays=Array.isArray(data)?data.length:0;
    const tot=Object.values(cnt).reduce((a,b)=>a+b,0);
    const avg=totalDays?(tot/totalDays).toFixed(1):0;
    document.getElementById('statsGrid').innerHTML=`
      <div class="stat-card"><div class="stat-n">${totalDays}</div><div class="stat-l">Días este mes</div></div>
      <div class="stat-card"><div class="stat-n">${avg}</div><div class="stat-l">Promedio de asistentes</div></div>
      <div class="stat-card"><div class="stat-n">${Math.max(0,...Object.values(cnt))}</div><div class="stat-l">Máx sesiones</div></div>`;
    const as=document.getElementById('attendStats');as.innerHTML='';
    [...PERSONS].sort((a,b)=>cnt[b]-cnt[a]).forEach(p=>{
      const pct=totalDays?Math.round(cnt[p]/totalDays*100):0;
      as.innerHTML+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
        <div style="width:34px;height:34px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-weight:900;color:${COLORS[p]}">${PI[p]}</div>
        <div style="flex:1"><div style="font-size:.83rem;font-weight:700">${p}${p===ME?' ●':''}</div>
          <div style="background:var(--border);border-radius:4px;height:4px;margin-top:6px"><div style="background:${COLORS[p]};border-radius:4px;height:4px;width:${pct}%"></div></div>
        </div>
        <div style="font-size:.88rem;font-weight:800;color:${COLORS[p]}">${cnt[p]} días</div>
      </div>`;
    });
  }catch(e){document.getElementById('statsGrid').innerHTML='<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:20px">Error cargando stats</div>';}
}
function showPage(id){
  ['restView','gymView','pageRutina','pageHistorial','pageStats'].forEach(p=>document.getElementById(p).classList.add('hidden'));
  if(id==='hoy'){
    if(isRest){document.getElementById('restView').classList.remove('hidden');buildRestDay();}
    else{document.getElementById('gymView').classList.remove('hidden');buildWeekStrip();buildAttendance();buildDayExList();buildBodyWeightCard('bodyWeightCard');}
  }else{
    document.getElementById(id).classList.remove('hidden');
    if(id==='pageRutina')buildRutinaPage();
    if(id==='pageHistorial')buildHistPage();
    if(id==='pageStats')buildStatsPage();
  }
}
function switchPage(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');showPage(el.dataset.page);
}
buildLogin();
if(ME){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('navBar').classList.remove('hidden');
  initApp();
}
</script>
