<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://i.imgur.com/doJIzda.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/doJIzda.png">
<meta name="theme-color" content="#0a0a0a">
<title>SOKOTROSKIS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--accent:#00c896;--bg:#0a0a0a;--card:#111111;--card2:#161616;--border:#1f1f1f;--text:#efefef;--muted:#666;--green:#00c896;--red:#e05555;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased;}
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
.login-sub{font-size:.75rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:40px;}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px;}
.login-btn{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:20px 10px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;user-select:none;}
.login-btn:active{transform:scale(.96);}
.login-btn .lav{width:52px;height:52px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;}
.login-btn .lnm{font-size:1rem;font-weight:700;color:var(--text);}
.login-btn:hover{border-color:var(--accent);background:#0e1a16;}
header{background:#0d0d0d;padding:8px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-brand span{font-size:1.1rem;font-weight:900;letter-spacing:3px;color:var(--accent);}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:5px 12px 5px 5px;cursor:pointer;transition:border-color .2s;}
.user-chip:hover{border-color:var(--accent);}
.uc-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;}
.uc-name{font-size:.75rem;font-weight:700;}
.day-banner{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:#0d0d0d;border-bottom:1px solid var(--border);}
.db-label{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.db-title{font-size:1.2rem;font-weight:800;margin-top:3px;}
.day-badge{background:var(--accent);color:#000;border-radius:8px;padding:5px 12px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;}
#restView{padding:16px 16px 90px;}
.rest-hero{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;margin-bottom:12px;}
.rest-big{font-size:3rem;margin-bottom:10px;}
.rest-hero h2{font-size:1.1rem;font-weight:800;margin-bottom:6px;}
.rest-hero p{color:var(--muted);font-size:.82rem;line-height:1.7;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;}
.info-card-title{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:12px;}
.next-row{display:flex;align-items:center;justify-content:space-between;}
.next-name{font-size:1rem;font-weight:800;}
.next-day{font-size:.7rem;color:var(--muted);margin-top:3px;}
.next-emoji{font-size:2rem;}
.ra-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.ra-row:last-child{border:none;}
.ra-person{display:flex;align-items:center;gap:10px;}
.ra-av{width:28px;height:28px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;}
.ra-name{font-size:.83rem;font-weight:600;}
.ra-bar-wrap{flex:1;margin:0 12px;background:var(--border);border-radius:4px;height:3px;}
.ra-bar{height:3px;border-radius:4px;}
.ra-count{font-size:.8rem;font-weight:700;min-width:28px;text-align:right;}
.streak-row{display:flex;justify-content:space-around;padding:4px 0;}
.streak-item{text-align:center;}
.streak-n{font-size:1.6rem;font-weight:900;color:var(--accent);}
.streak-l{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:3px;}
#gymView{padding:16px 16px 90px;}
.section{margin-bottom:20px;}
.section-title{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px;}
.week-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.wday{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 6px;text-align:center;transition:border-color .2s,background .2s;}
.wday.active{border-color:var(--accent);background:#0c1a14;}
.wd-name{font-size:.58rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;}
.wday.active .wd-name{color:var(--accent);}
.wd-emoji{font-size:1.25rem;margin:5px 0;}
.wd-muscle{font-size:.62rem;font-weight:700;line-height:1.3;}
.attend-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.pcard{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:10px 4px;text-align:center;transition:all .2s;user-select:none;}
.pcard.going{background:#0b1a13;border-color:var(--green);}
.pcard.nope{background:#1a0e0e;border-color:var(--red);opacity:.6;}
.pcard.other{opacity:.5;cursor:default;}
.pavatar{width:40px;height:40px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;background:#1e1e1e;}
.going .pavatar{background:#122018;}.nope .pavatar{background:#1e1010;}
.pname{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.pstatus{font-size:.95rem;margin-top:4px;}
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:.6rem;color:var(--muted);margin-left:8px;vertical-align:middle;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sync-dot.syncing{background:#f0a500;animation:pulse .8s infinite;}
.sync-dot.error{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.attend-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.attend-btn{padding:22px 10px;border-radius:16px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:1.6rem;font-weight:900;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;font-family:'Inter',sans-serif;}
.attend-btn span{font-size:.72rem;letter-spacing:1.5px;font-weight:700;}
.attend-btn.going-active{border-color:var(--green);background:#0b1a13;color:#2ecc71;}
.attend-btn.nope-active{border-color:var(--red);background:#1a0e0e;color:var(--red);}
.bw-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.bw-left{display:flex;align-items:center;gap:10px;}
.bw-icon{font-size:1.4rem;}
.bw-label{font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;}
.bw-value{font-size:1.1rem;font-weight:900;color:var(--accent);margin-top:2px;}
.bw-value.empty{color:var(--muted);font-size:.85rem;font-weight:600;}
.bw-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.bw-btn.empty{background:var(--card2);border:1.5px dashed var(--border);color:var(--muted);}
.day-exercises{margin-top:4px;}
.ex-accordion{background:var(--card);border:1.5px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.ex-accordion-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.ex-accordion-header:active{background:#161616;}
.ex-acc-name{font-size:.9rem;font-weight:700;}
.ex-acc-reps{font-size:.65rem;color:var(--muted);margin-top:2px;}
.ex-acc-weight{font-size:.78rem;font-weight:700;color:var(--accent);margin-right:8px;}
.ex-acc-weight.empty{color:var(--muted);}
.ex-acc-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.ex-accordion.open .ex-acc-arrow{transform:rotate(180deg);}
.ex-accordion-body{padding:0 16px 14px;display:none;border-top:1px solid var(--border);}
.ex-accordion.open .ex-accordion-body{display:block;}
.ex-body-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.ex-body-row:last-child{border:none;}
.ex-hist-mini{font-size:.7rem;color:var(--muted);}
.ex-hist-mini span{color:var(--text);font-weight:600;}
.weight-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:7px 14px;font-size:.78rem;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;}
.weight-btn.empty{background:var(--card2);border:1.5px dashed var(--border);color:var(--muted);}
.variant-toggle{display:flex;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:3px;margin:10px 0 2px;}
.vt-btn{flex:1;padding:6px 4px;text-align:center;font-size:.62rem;font-weight:700;cursor:pointer;border-radius:6px;color:var(--muted);transition:all .15s;border:none;background:none;font-family:'Inter',sans-serif;white-space:nowrap;}
.vt-btn.active{background:var(--accent);color:#000;}
.person-selector{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.psel-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.7rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s;font-family:'Inter',sans-serif;}
.psel-btn.active{background:#0c1a14;border-color:var(--accent);color:var(--accent);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:#141414;border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:24px 20px;width:100%;max-width:520px;transform:translateY(40px);transition:transform .2s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal h3{font-size:1rem;font-weight:800;margin-bottom:4px;}
.modal .msub{font-size:.73rem;color:var(--muted);margin-bottom:16px;}
.weight-input-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;}
.weight-input-row input{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-size:1.3rem;font-weight:800;color:var(--text);text-align:center;font-family:'Inter',sans-serif;}
.weight-input-row input:focus{outline:none;border-color:var(--accent);}
.weight-input-row .unit{color:var(--muted);font-size:.85rem;font-weight:700;min-width:28px;}
.mhist-title{font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.hist-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:.77rem;}
.hist-row:last-child{border:none;}
.hist-date{color:var(--muted);}
.hist-w{font-weight:700;color:var(--accent);}
.btn-save{background:var(--accent);border:none;border-radius:12px;padding:13px;width:100%;color:#000;font-size:.92rem;font-weight:800;cursor:pointer;letter-spacing:.5px;font-family:'Inter',sans-serif;}
.btn-cancel{background:none;border:none;color:var(--muted);font-size:.78rem;cursor:pointer;width:100%;padding:8px;margin-top:4px;font-family:'Inter',sans-serif;}
.page-inner{padding:16px 16px 90px;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-n{font-size:1.7rem;font-weight:900;color:var(--accent);}
.stat-l{font-size:.58rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-top:4px;}
.nav-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:#0d0d0d;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 16px;z-index:50;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 14px;border-radius:8px;}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--accent);}
.nav-item:not(.active) .nav-icon,.nav-item:not(.active) .nav-label{color:#333;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:.55rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;}
.rut-day-block{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.rut-day-header{padding:13px 16px;background:#0d0d0d;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.rut-day-left{display:flex;align-items:center;gap:10px;}
.rut-day-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.rut-day-block.open .rut-day-arrow{transform:rotate(180deg);}
.rut-day-body{padding:10px 16px 14px;display:none;}
.rut-day-block.open .rut-day-body{display:block;}
.rut-ex-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.8rem;align-items:center;}
.rut-ex-row:last-child{border:none;}
/* HISTORIAL */
.hist-group-block{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.hist-group-header{padding:13px 16px;background:#0d0d0d;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.hist-group-title{display:flex;align-items:center;gap:8px;}
.hist-group-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.hist-group-block.open .hist-group-arrow{transform:rotate(180deg);}
.hist-group-body{display:none;}
.hist-group-block.open .hist-group-body{display:block;}
.hist-ex-item{border-bottom:1px solid var(--border);}
.hist-ex-item:last-child{border:none;}
.hist-ex-header{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.hex-name{font-size:.82rem;font-weight:700;}
.hex-pr{background:#0c1a14;color:var(--accent);font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:6px;}
.hist-ex-body{padding:0 16px 10px;display:none;background:#0a0a0a;}
.hist-ex-body.open{display:block;}
.hist-ex-row{display:flex;justify-content:space-between;align-items:center;font-size:.77rem;padding:5px 0;border-bottom:1px solid var(--border);}
.hist-ex-row:last-child{border:none;}
.delta{font-size:.62rem;font-weight:700;padding:2px 5px;border-radius:4px;}
.delta-up{background:#0c2018;color:#2ecc71;}
.delta-down{background:#1e0e0e;color:#e05555;}
.delta-eq{background:#1a1a1a;color:var(--muted);}
/* PESO CORPORAL HISTORIAL */
.bw-hist-block{background:var(--card);border:1.5px solid #2a1a3e;border-radius:14px;margin-bottom:10px;overflow:hidden;}
.bw-hist-header{padding:13px 16px;background:#0d0b14;border-bottom:1px solid #2a1a3e;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.bw-hist-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;}
.bw-hist-block.open .bw-hist-arrow{transform:rotate(180deg);}
.bw-hist-body{padding:10px 16px 14px;display:none;}
.bw-hist-block.open .bw-hist-body{display:block;}
.bw-delta-up{background:#1e0e0e;color:#e05555;}
.bw-delta-down{background:#0c2018;color:#2ecc71;}
.hidden{display:none!important;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.loading .spin{font-size:2rem;animation:spin 1s linear infinite;display:block;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#161616;border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:.78rem;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}
</style>
</head>
<body>

<div id="loginScreen">
  <img src="https://i.imgur.com/doJIzda.png" style="width:220px;height:220px;border-radius:36px;margin-bottom:10px;">
  <div class="login-sub">Seleccioná tu perfil</div>
  <div class="login-grid" id="loginGrid"></div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="header-brand">
      <img src="https://i.imgur.com/3VSDcxC.jpeg" style="height:28px;border-radius:50%;">
      <span>SOKOTROSKIS</span>
    </div>
    <div class="user-chip" onclick="logout()">
      <div class="uc-av" id="ucAv"></div>
      <span class="uc-name" id="ucName"></span>
    </div>
  </header>
  <div class="day-banner" id="dayBanner"></div>
  <div id="restView" class="hidden"></div>
  <div id="gymView" class="hidden">
    <div class="section" style="padding:16px 16px 0">
      <div class="section-title">Esta semana</div>
      <div class="week-strip" id="weekStrip"></div>
    </div>
    <div style="padding:0 16px">
      <div class="section" style="margin-top:20px">
        <div class="section-title">¿Vas hoy? <span class="sync-badge"><span class="sync-dot" id="syncDot"></span><span id="syncTxt">sincronizado</span></span></div>
        <div id="myAttend"></div>
        <div class="section-title" style="margin-top:4px">El grupo</div>
        <div class="attend-grid" id="attendGrid"></div>
      </div>
      <div class="section">
        <div class="section-title">Ejercicios de hoy</div>
        <div id="bwCardHoy"></div>
        <div class="day-exercises" id="dayExList"></div>
      </div>
    </div>
  </div>
  <div id="pageRutina" class="hidden"><div class="page-inner"><div class="section-title">Rutina completa</div><div id="rutinaFull"></div></div></div>
  <div id="pageHistorial" class="hidden">
    <div class="page-inner">
      <div class="section-title">Historial & Progresión</div>
      <div class="person-selector" id="histPersonSelector"></div>
      <div id="histContent"></div>
    </div>
  </div>
  <div id="pageStats" class="hidden">
    <div class="page-inner">
      <div class="section-title">Estadísticas del grupo</div>
      <div class="stats-grid" id="statsGrid" style="margin-bottom:20px"></div>
      <div class="section-title">Asistencia por persona</div>
      <div id="attendStats"></div>
    </div>
  </div>
</div>

<nav class="nav-bar hidden" id="navBar">
  <div class="nav-item active" data-page="hoy" onclick="switchPage(this)"><span class="nav-icon">🏠</span><span class="nav-label">Hoy</span></div>
  <div class="nav-item" data-page="pageRutina" onclick="switchPage(this)"><span class="nav-icon">📅</span><span class="nav-label">Rutina</span></div>
  <div class="nav-item" data-page="pageHistorial" onclick="switchPage(this)"><span class="nav-icon">📈</span><span class="nav-label">Historial</span></div>
  <div class="nav-item" data-page="pageStats" onclick="switchPage(this)"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></div>
</nav>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalExName"></h3>
    <div class="msub" id="modalExSeries"></div>
    <div class="weight-input-row">
      <input type="number" id="weightInput" placeholder="0" min="0" step="0.1"/>
      <span class="unit" id="weightUnit">kg</span>
    </div>
    <div id="modalDateRow" style="margin-bottom:14px;display:none">
      <div style="font-size:.6rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px">Fecha</div>
      <input type="date" id="modalDate" style="width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.9rem;font-weight:700;color:var(--text);font-family:'Inter',sans-serif;"/>
    </div>
    <div id="modalHist"></div>
    <button class="btn-save" onclick="saveWeight()">Guardar</button>
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API='https://script.google.com/macros/s/AKfycbzPtXxxYOsjXCsnLR6ApckENIEghkiKC6hKwwqg9aWSusBbofi_T7yl8jN9gLFdQXri/exec';

function getAltura(p){return parseFloat(localStorage.getItem('altura_'+p))||null;}
function setAltura(p,v){localStorage.setItem('altura_'+p,v);}
function getStrengthRatio(p){
  // average of (weight_lifted / body_weight) across STRENGTH_EX
  const bw=+(getPesoHistorial(p,'Peso corporal')[0]?.peso_kg||0);
  if(!bw)return null;
  let sum=0,count=0;
  STRENGTH_EX.forEach(ex=>{
    const h=getPesoHistorial(p,ex);
    if(h.length){sum+=(+h[0].peso_kg/bw);count++;}
  });
  return count?+(sum/count).toFixed(3):null;
}
let ME=localStorage.getItem('sokoUser')||null;

// ── UTILS ─────────────────────────────────────────────────
function normDate(v){
  if(!v)return'';
  // already YYYY-MM-DD string
  if(typeof v==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
  // ISO with T or other formats
  const d=new Date(v);
  if(!isNaN(d))return d.toLocaleDateString('en-CA');
  return String(v).slice(0,10);
}
async function api(params){
  const r=await fetch(API+'?'+new URLSearchParams(params).toString());
  return r.json();
}
function setSyncStatus(s){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');
  if(!dot)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'sincronizando...':s==='error'?'sin conexión':'sincronizado';
}
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),2500);
}

// normalize pesos dates on load
function normalizePesos(rows){
  return(rows||[]).map(r=>({...r,fecha:normDate(r.fecha)}));
}
// dedup by date keeping last entry per date
function dedupByDate(rows){
  const m={};
  rows.forEach(r=>{m[r.fecha]=r;});
  return Object.values(m);
}
function getPesoHistorial(persona,ejercicio){
  const rows=(cache.pesos[persona]||[]).filter(r=>r.ejercicio===ejercicio);
  return dedupByDate(rows).sort((a,b)=>b.fecha.localeCompare(a.fecha));
}
function getPesoHoy(persona,ejercicio){
  return(getPesoHistorial(persona,ejercicio).find(r=>r.fecha===todayStr)||null)?.peso_kg||null;
}
function getExKey(name){
  if(!VARIANTS[name])return name;
  return name+' - '+(selVariant[name]||VARIANTS[name][0]);
}

async function loadPesos(persona){
  if(cache.pesos[persona])return;
  try{
    const rows=await api({action:'getPesos',persona});
    cache.pesos[persona]=normalizePesos(rows);
  }catch(e){cache.pesos[persona]=[];}
}
async function loadRecords(){
  if(cache.records)return;
  try{
    const rows=await api({action:'getRecords'});
    cache.records=(rows||[]).map(r=>({...r,fecha:normDate(r.fecha)}));
  }catch(e){cache.records=[];}
}

  document.getElementById('app').classList.add('hidden');

// ── REST DAY ──────────────────────────────────────────────
async function buildRestDay(){
  const ti=DAY_NAMES.indexOf(todayDay);let next=null;
  for(let i=1;i<=7;i++){const d=DAY_NAMES[(ti+i)%7];if(GYM_DAYS.includes(d)){next=d;break;}}
  const cnt={};PERSONS.forEach(p=>{cnt[p]=0;});
  try{
    const data=await api({action:'getAsistenciaMes',mes:todayStr.slice(0,7)});
    if(Array.isArray(data))data.forEach(row=>PERSONS.forEach(p=>{if(row[p.toLowerCase()]===1||row[p.toLowerCase()]==='1')cnt[p]++;}));
  }catch(e){}
  const maxCnt=Math.max(1,...Object.values(cnt));
  const totalDays=Math.max(1,...Object.values(cnt));
  document.getElementById('restView').innerHTML=`
    <div class="rest-hero"><div class="rest-big">💤</div><h2>Día de descanso</h2><p>El músculo crece cuando descansás.<br>Hoy toca recuperar, mañana volvemos con todo.</p></div>
    ${next?`<div class="info-card"><div class="info-card-title">Próximo entrenamiento</div><div class="next-row"><div><div class="next-name">${ROUTINE[next].muscle}</div><div class="next-day">${next}</div></div><div class="next-emoji">${ROUTINE[next].emoji}</div></div></div>`:''}
    <div class="info-card"><div class="info-card-title">Asistencia del grupo — ${today.toLocaleDateString('es-AR',{month:'long'})}</div>
      ${PERSONS.map(p=>`<div class="ra-row"><div class="ra-person"><div class="ra-av" style="color:${COLORS[p]}">${PI[p]}</div><div class="ra-name">${p}${p===ME?' ●':''}</div></div><div class="ra-bar-wrap"><div class="ra-bar" style="width:${Math.round(cnt[p]/maxCnt*100)}%;background:${COLORS[p]}"></div></div><div class="ra-count" style="color:${COLORS[p]}">${cnt[p]}</div></div>`).join('')}
    </div>
    <div class="info-card"><div class="info-card-title">Tu mes, ${ME}</div><div class="streak-row">
      <div class="streak-item"><div class="streak-n">${cnt[ME]}</div><div class="streak-l">Sesiones</div></div>
      <div class="streak-item"><div class="streak-n">${Math.round(cnt[ME]/totalDays*100)}%</div><div class="streak-l">Asistencia</div></div>
      <div class="streak-item"><div class="streak-n">${[...PERSONS].sort((a,b)=>cnt[b]-cnt[a]).indexOf(ME)+1}°</div><div class="streak-l">Ranking</div></div>
    </div></div>`;
}

// ── ATTENDANCE ────────────────────────────────────────────
async function setAttendance(valor){
  setSyncStatus('syncing');
  if(!cache.asistencia)cache.asistencia={};
  const cur=cache.asistencia[ME.toLowerCase()];
  const newVal=(cur===valor||cur===String(valor))?null:valor;
  cache.asistencia[ME.toLowerCase()]=newVal;
  renderAttendance();
  try{
    await api({action:'setAsistencia',fecha:todayStr,dia_semana:todayDay,musculo:ROUTINE[todayDay]?.muscle||'',persona:ME,valor:newVal===null?-1:newVal});
    setSyncStatus('ok');
    showToast(newVal===1?'✅ ¡Vas hoy!':newVal===0?'❌ No vas hoy':'↩️ Desmarcado',newVal===1?'ok':'err');
  }catch(e){setSyncStatus('error');showToast('Error al guardar','err');}
}
async function buildAttendance(){
  setSyncStatus('syncing');
  try{cache.asistencia=await api({action:'getAsistencia',fecha:todayStr});setSyncStatus('ok');}
  catch(e){setSyncStatus('error');}
  renderAttendance();
}
function renderAttendance(){
  const d=cache.asistencia||{};
  const val=d[ME.toLowerCase()];
  const v=val===1||val==='1'?true:val===0||val==='0'?false:null;
  document.getElementById('myAttend').innerHTML=`
    <div class="attend-btns">
      <button class="attend-btn ${v===true?'going-active':''}" onclick="setAttendance(1)">✅<span>VOY</span></button>
      <button class="attend-btn ${v===false?'nope-active':''}" onclick="setAttendance(0)">❌<span>NO VOY</span></button>
    </div>`;
  const grid=document.getElementById('attendGrid');grid.innerHTML='';
  PERSONS.forEach(p=>{
    const pv=(d[p.toLowerCase()]===1||d[p.toLowerCase()]==='1')?true:(d[p.toLowerCase()]===0||d[p.toLowerCase()]==='0')?false:null;
    const isMe=p===ME;
    const card=document.createElement('div');
    card.className='pcard'+(pv===true?' going':pv===false?' nope':'')+(isMe?' me':' other');
    card.innerHTML=`<div class="pavatar" style="color:${COLORS[p]};${isMe?'outline:2px solid '+COLORS[p]+';outline-offset:2px':''}">${PI[p]}</div><div class="pname">${p}</div><div class="pstatus">${pv===true?'✅':pv===false?'❌':'❓'}</div>`;
    grid.appendChild(card);
  });
}

// ── PESO CORPORAL (Hoy) ───────────────────────────────────
function renderBWCardHoy(){
  const el=document.getElementById('bwCardHoy');if(!el)return;
  const w=getPesoHoy(ME,'Peso corporal');
  const prof=PROFILES[ME]||{};
  const altura=getAltura(ME);
  const objColor=prof.objetivo==='bajar'?'#5b9cf6':prof.objetivo==='mantener'?'#f59e0b':'#2ecc71';
  const alturaHtml=altura?`<div style="font-size:.6rem;color:var(--muted);margin-top:2px">${altura} cm · <span style="color:${objColor}">${prof.meta||''}</span></div>`
    :`<div style="font-size:.6rem;color:var(--accent);margin-top:2px;cursor:pointer" onclick="promptAltura()">+ Agregar altura</div>`;
  el.innerHTML=`
    <div class="bw-card">
      <div class="bw-left">
        <div class="bw-icon">⚖️</div>
        <div>
          <div class="bw-label">Peso corporal</div>
          <div class="bw-value${w?'':' empty'}">${w?w+' kg':'Sin registrar hoy'}</div>
          ${alturaHtml}
        </div>
      </div>
      <button class="bw-btn${w?'':' empty'}" onclick="openModal({name:'Peso corporal',isBW:true})">${w?'Editar':'+ Registrar'}</button>
    </div>`;
}
function promptAltura(){
  const v=prompt('¿Cuánto medís? (en cm, ej: 178)');
  if(v&&!isNaN(+v)&&+v>100&&+v<230){setAltura(ME,+v);renderBWCardHoy();showToast('📏 Altura guardada: '+v+' cm');}
}

// ── EJERCICIOS DEL DÍA ────────────────────────────────────
async function buildDayExList(){
  const el=document.getElementById('dayExList');if(!el)return;
  const r=ROUTINE[todayDay];
  if(!r||!r.exercises.length){el.innerHTML='';return;}
  await loadPesos(ME);
  await loadRecords();
  renderBWCardHoy();
  el.innerHTML='';
  r.exercises.forEach((ex,i)=>{
    const isRec=ex.type==='record';
    const isReps=ex.unit==='reps';
    const exKey=getExKey(ex.name);
    const w=isRec?null:getPesoHoy(ME,exKey);
    const pr=(cache.records||[]).find(rec=>rec.persona.toLowerCase()===ME.toLowerCase()&&rec.ejercicio===exKey);
    const hist=isRec?[]:getPesoHistorial(ME,exKey);
    const lastPrev=hist.find(e=>e.fecha!==todayStr);
    const repsLabel=isRec?'lo que te dé 😤':`${ex.repsMin}-${ex.repsMax} reps`;
    const unitLabel=isReps?'reps':'kg';
    const wLabel=isRec?(pr?`🏆 ${pr.valor} reps`:'Sin récord'):(w?`${w} ${unitLabel}`:'+ '+(isReps?'Reps':'Peso'));
    const wClass=w||pr?'':'empty';
    let varHtml='';
    if(VARIANTS[ex.name]){
      const cur=selVariant[ex.name]||VARIANTS[ex.name][0];
      varHtml=`<div class="variant-toggle" id="vtog-${i}">${VARIANTS[ex.name].map(v=>`<button class="vt-btn${v===cur?' active':''}" onclick="selectVariant(${i},'${ex.name}','${v}')">${v}</button>`).join('')}</div>`;
    }
    const acc=document.createElement('div');acc.className='ex-accordion';acc.id=`exacc-${i}`;
    acc.innerHTML=`
      <div class="ex-accordion-header" onclick="toggleAcc(${i})">
        <div><div class="ex-acc-name">${isRec?'🏆 ':''} ${ex.name}</div><div class="ex-acc-reps">${repsLabel}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="ex-acc-weight ${wClass}" id="wlabel-${i}">${wLabel}</span>
          <span class="ex-acc-arrow">▼</span>
        </div>
      </div>
      <div class="ex-accordion-body">
        ${varHtml}
        <div class="ex-body-row">
          <div class="ex-hist-mini" id="exhist-${i}">${lastPrev?`Última vez: <span>${lastPrev.peso_kg} ${unitLabel}</span> (${lastPrev.fecha})`:(pr?`Récord: <span>${pr.valor} reps</span>`:'Sin historial')}</div>
          <button class="weight-btn ${wClass}" id="exbtn-${i}" onclick='openModal(${JSON.stringify({...ex,name:exKey})})'>${isRec?(pr?'Actualizar':'Marcar récord'):(w?`Editar (${w} ${unitLabel})`:'Cargar '+(isReps?'reps':'peso'))}</button>
        </div>
        ${!isRec&&hist.length>1?`<div id="exhistlist-${i}">${hist.slice(0,3).map(e=>`<div class="hist-row"><span class="hist-date">${e.fecha}</span><span class="hist-w">${e.peso_kg} ${unitLabel}</span></div>`).join('')}</div>`:`<div id="exhistlist-${i}"></div>`}
      </div>`;
    el.appendChild(acc);
  });
}
function toggleAcc(i){document.getElementById(`exacc-${i}`).classList.toggle('open');}
function selectVariant(i,base,v){
  selVariant[base]=v;
  document.getElementById(`vtog-${i}`).querySelectorAll('.vt-btn').forEach(b=>b.className='vt-btn'+(b.textContent===v?' active':''));
  const exKey=base+' - '+v;
  const ex=ROUTINE[todayDay].exercises[i];
  const w=getPesoHoy(ME,exKey);
  const hist=getPesoHistorial(ME,exKey);
  const lp=hist.find(e=>e.fecha!==todayStr);
  const wl=document.getElementById(`wlabel-${i}`);
  if(wl){wl.textContent=w?w+' kg':'+ Peso';wl.className='ex-acc-weight'+(w?'':' empty');}
  const btn=document.getElementById(`exbtn-${i}`);
  if(btn){btn.className='weight-btn'+(w?'':' empty');btn.textContent=w?`Editar (${w} kg)`:'Cargar peso';btn.onclick=()=>openModal({...ex,name:exKey});}
  const hn=document.getElementById(`exhist-${i}`);
  if(hn)hn.innerHTML=lp?`Última vez: <span style="color:var(--text);font-weight:600">${lp.peso_kg} kg</span> (${lp.fecha})`:'Sin historial';
  const hl=document.getElementById(`exhistlist-${i}`);
  if(hl)hl.innerHTML=hist.length>1?hist.slice(0,3).map(e=>`<div class="hist-row"><span class="hist-date">${e.fecha}</span><span class="hist-w">${e.peso_kg} kg</span></div>`).join(''):'';
}

// ── MODAL ─────────────────────────────────────────────────
let modalEx=null;
function openModal(ex, allowDateEdit=false){
  modalEx=ex;
  const isRec=ex.type==='record';
  const isReps=ex.unit==='reps';
  document.getElementById('modalExName').textContent=ex.name;
  document.getElementById('modalExSeries').textContent=ex.isBW?'Peso corporal':isRec?'Récord de repeticiones — lo que te dé 😤':`${ex.repsMin}-${ex.repsMax} reps`;
  document.getElementById('weightUnit').textContent=isRec?'reps':isReps?'reps':'kg';
  // date input — show only from historial
  const dateRow=document.getElementById('modalDateRow');
  const dateInput=document.getElementById('modalDate');
  if(allowDateEdit&&!isRec){
    dateRow.style.display='block';
    dateInput.value=todayStr;
    dateInput.max=todayStr;
  } else {
    dateRow.style.display='none';
    dateInput.value=todayStr;
  }
  document.getElementById('weightInput').value=isRec?((cache.records||[]).find(r=>r.persona.toLowerCase()===ME.toLowerCase()&&r.ejercicio===ex.name)?.valor||''):(getPesoHoy(ME,ex.name)||'');
  const hist=document.getElementById('modalHist');
  if(isRec){hist.innerHTML='';}
  else{
    const entries=getPesoHistorial(ME,ex.name);
    hist.innerHTML=entries.length
      ?`<div class="mhist-title">Historial reciente</div>`+entries.slice(0,4).map(e=>`<div class="hist-row"><span class="hist-date">${e.fecha}</span><span class="hist-w">${e.peso_kg} kg</span></div>`).join('')
      :'<div class="mhist-title" style="margin-bottom:0">Sin historial aún</div>';
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('weightInput').focus(),200);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');modalEx=null;}
async function saveWeight(){
  const val=parseFloat(document.getElementById('weightInput').value);
  if(!val||isNaN(val)){closeModal();return;}
  const exCopy={...modalEx};
  const fechaGuardar=document.getElementById('modalDate').value||todayStr;
  closeModal();
  const isRec=exCopy.type==='record';
  try{
    if(isRec){
      const res=await api({action:'setRecord',persona:ME,ejercicio:exCopy.name,valor:val,fecha:fechaGuardar});

      else showToast('Récord actual: '+res.valor+' reps');
    }else{
      await api({action:'setPeso',persona:ME,ejercicio:exCopy.name,peso_kg:val,fecha:fechaGuardar,series:3,reps_min:exCopy.repsMin||0,reps_max:exCopy.repsMax||0});
      if(!cache.pesos[ME])cache.pesos[ME]=[];
      cache.pesos[ME]=cache.pesos[ME].filter(r=>!(r.fecha===fechaGuardar&&r.ejercicio===exCopy.name));
      cache.pesos[ME].push({fecha:fechaGuardar,persona:ME,ejercicio:exCopy.name,peso_kg:val});

    }
    if(exCopy.isBW){renderBWCardHoy();}else if(fechaGuardar===todayStr){buildDayExList();}else{buildHistPage();}
  }catch(e){showToast('Error: '+e.message,'err');console.error(e);}
}

// ── HISTORIAL ─────────────────────────────────────────────
function deltaHtml(cur,prev,invert){
  if(!prev)return'';
  const d=+(+cur - +prev).toFixed(1);
  if(d===0)return`<span class="delta delta-eq">=</span>`;
  const up=invert?d<0:d>0;
  return`<span class="delta ${up?'delta-up':'delta-down'}">${d>0?'+':''}${d} kg</span>`;
}
function renderInlineChart(data,color,uid){
  if(!data||data.length<2)return'';
  const W=288,H=80,PL=28,PR=8,PT=8,PB=18;
  const cW=W-PL-PR,cH=H-PT-PB;
  const ws=data.map(d=>+d.peso_kg);
  const mn=Math.min(...ws)-2,mx=Math.max(...ws)+2;
  const xS=i=>(data.length<2)?cW/2:(i/(data.length-1))*cW;
  const yS=w=>mx===mn?cH/2:cH-((w-mn)/(mx-mn))*cH;
  const pts=data.map((d,i)=>({x:xS(i)+PL,y:yS(+d.peso_kg)+PT,d}));
  const line=pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
  const fill=`${line} L${pts[pts.length-1].x},${H-PB+PT} L${pts[0].x},${H-PB+PT} Z`;
  const gid='g'+uid.replace(/[^a-z0-9]/gi,'_');
  const tip_id='tip'+uid.replace(/[^a-z0-9]/gi,'_');
  const wrap_id='wrap'+uid.replace(/[^a-z0-9]/gi,'_');
  return`<div style="position:relative;margin:10px 0 6px" id="${wrap_id}">
    <svg class="linechart" viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <text x="${PL}" y="${H-2}" text-anchor="middle" font-size="7" fill="#555">${data[0].fecha.slice(5)}</text>
      <text x="${pts[pts.length-1].x}" y="${H-2}" text-anchor="middle" font-size="7" fill="#555">${data[data.length-1].fecha.slice(5)}</text>
      <path d="${fill}" fill="url(#${gid})"/>
      <path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map((p,i)=>`<circle class="dot" cx="${p.x}" cy="${p.y}" r="${i===pts.length-1?3.5:2.5}" fill="${i===pts.length-1?color:'#111'}" stroke="${color}" stroke-width="1.2" data-i="${i}" style="cursor:pointer"/>`).join('')}
    </svg>
    <div id="${tip_id}" style="position:absolute;background:#1a1a1a;border:1px solid ${color};border-radius:8px;padding:6px 10px;font-size:.68rem;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;z-index:10;top:0;left:0"></div>
  </div>
  <script>
  (function(){
    const wrap=document.getElementById('${wrap_id}');
    const tip=document.getElementById('${tip_id}');
    const data=${JSON.stringify(data)};
    wrap.querySelectorAll('.dot').forEach(dot=>{
      const show=()=>{
        const i=+dot.dataset.i;
        const d=data[i],prev=data[i-1];
        const delta=prev?(+(+d.peso_kg - +prev.peso_kg).toFixed(1)):null;
        const dh=delta!==null?'<br><span style="color:'+(delta>=0?'#2ecc71':'#e05555')+'">'+(delta>=0?'+':'')+delta+' kg vs ant.</span>':'';
        tip.innerHTML='<span style="color:#888;font-size:.6rem">'+d.fecha+'</span><br><strong style="color:${color};font-size:.85rem">'+d.peso_kg+' kg</strong>'+dh;
        const wr=wrap.getBoundingClientRect(),dr=dot.getBoundingClientRect();
        let l=dr.left-wr.left-40,t=dr.top-wr.top-60;
        if(l<0)l=0;if(l>wr.offsetWidth-120)l=wr.offsetWidth-120;
        if(t<0)t=4;
        tip.style.left=l+'px';tip.style.top=t+'px';tip.style.opacity='1';
      };
      dot.addEventListener('mouseenter',show);
      dot.addEventListener('touchstart',e=>{e.preventDefault();show();setTimeout(()=>tip.style.opacity='0',2000);});
      dot.addEventListener('mouseleave',()=>tip.style.opacity='0');
    });
  })();
  <\/script>`;
}

function getAllExerciseKeys(){
  const keys=[];
  GYM_DAYS.forEach(day=>{
    ROUTINE[day].exercises.forEach(ex=>{
      if(VARIANTS[ex.name]){
        VARIANTS[ex.name].forEach(v=>keys.push({label:ex.name+' - '+v,key:ex.name+' - '+v,day,ex}));
      } else {
        keys.push({label:ex.name,key:ex.name,day,ex});
      }
    });
  });
  return keys;
}

function renderMultiChart(exKey){
  const allData={};
  PERSONS.forEach(p=>{
    const rows=getPesoHistorial(p,exKey);
    if(rows.length)allData[p]=[...rows].reverse();
  });
  const persons=Object.keys(allData);
  const chartEl=document.getElementById('todosChart');
  if(!chartEl)return;
  if(!persons.length){
    chartEl.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:.8rem">Sin datos para este ejercicio todavía.</div>';
    return;
  }
  const W=320,H=110,PL=32,PR=8,PT=10,PB=20;
  const cW=W-PL-PR,cH=H-PT-PB;
  const allDates=[...new Set(persons.flatMap(p=>allData[p].map(d=>d.fecha)))].sort();
  const allWeights=persons.flatMap(p=>allData[p].map(d=>+d.peso_kg));
  const mn=Math.min(...allWeights)-2,mx=Math.max(...allWeights)+2;
  const xS=i=>allDates.length<2?cW/2:(i/(allDates.length-1))*cW;
  const yS=w=>mx===mn?cH/2:cH-((w-mn)/(mx-mn))*cH;
  const lines=persons.map(p=>{
    const color=COLORS[p];
    const pts=allData[p].map(d=>({x:xS(allDates.indexOf(d.fecha))+PL,y:yS(+d.peso_kg)+PT}));
    const pathD=pts.map((pt,i)=>i===0?`M${pt.x},${pt.y}`:`L${pt.x},${pt.y}`).join(' ');
    const dots=pts.map((pt,i)=>`<circle cx="${pt.x}" cy="${pt.y}" r="${i===pts.length-1?3.5:2.5}" fill="${i===pts.length-1?color:'#111'}" stroke="${color}" stroke-width="1.2"/>`).join('');
    return`<path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" opacity="0.9"/>${dots}`;
  }).join('');
  const yLabels=[mn+2,mx-2].map(w=>`<text x="${PL-4}" y="${yS(w)+PT+3}" text-anchor="end" font-size="7" fill="#555">${w.toFixed(0)}</text>`).join('');
  const xLabels=allDates.length>=2?`<text x="${PL}" y="${H-2}" text-anchor="middle" font-size="7" fill="#555">${allDates[0].slice(5)}</text><text x="${W-PR}" y="${H-2}" text-anchor="end" font-size="7" fill="#555">${allDates[allDates.length-1].slice(5)}</text>`:'';
  const svgHtml=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible;margin:8px 0 4px">${yLabels}${xLabels}${lines}</svg>`;
  // legend sorted by last value desc
  const sorted=[...persons].sort((a,b)=>+allData[b][allData[b].length-1].peso_kg - +allData[a][allData[a].length-1].peso_kg);
  const legend=sorted.map(p=>{
    const last=allData[p][allData[p].length-1];
    return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">
      <div style="width:8px;height:8px;border-radius:50%;background:${COLORS[p]};flex-shrink:0"></div>
      <span style="font-size:.78rem;font-weight:700;flex:1">${p}</span>
      <span style="font-size:.78rem;color:${COLORS[p]};font-weight:800">${last.peso_kg} kg</span>
    </div>`;
  }).join('');
  chartEl.innerHTML=`
    <div style="font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px">${exKey}</div>
    ${svgHtml}${legend}`;
}

            <div class="hex-name">${key}</div>
            <div style="display:flex;align-items:center;gap:6px">
              ${canAdd?`<button onclick="openModal(_histEx['${neid}'],true)" style="background:var(--card2);border:1px dashed var(--accent);color:var(--accent);border-radius:6px;padding:3px 8px;font-size:.6rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">+ kg</button>`:''}
              <div style="font-size:.62rem;color:var(--muted)">sin datos</div>
            </div>
          </div>
        </div>`;
    });
    html+=`</div></div>`;
  });

  if(!bwRows.length&&!anyEx){
    html=`<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:2rem;margin-bottom:8px">📭</div>Sin datos para ${histP} todavía.</div>`;
  }
  content.innerHTML=html;
}

// ── STATS ─────────────────────────────────────────────────
async function buildStatsPage(){
  document.getElementById('statsGrid').innerHTML='<div class="loading" style="grid-column:1/-1"><span class="spin">⏳</span></div>';
  try{
    const data=await api({action:'getAsistenciaMes',mes:todayStr.slice(0,7)});
    const cnt={};PERSONS.forEach(p=>{cnt[p]=0;});
    if(Array.isArray(data))data.forEach(row=>PERSONS.forEach(p=>{if(row[p.toLowerCase()]===1||row[p.toLowerCase()]==='1')cnt[p]++;}));
    const totalDays=Array.isArray(data)?data.length:0;
    const avg=totalDays?(Object.values(cnt).reduce((a,b)=>a+b,0)/totalDays).toFixed(1):0;
    // días sin nadie = días donde nadie marcó asistencia
    const sinNadie=Array.isArray(data)?data.filter(row=>PERSONS.every(p=>!(row[p.toLowerCase()]===1||row[p.toLowerCase()]==='1'))).length:0;
    document.getElementById('statsGrid').innerHTML=`
      <div class="stat-card"><div class="stat-n">${totalDays}</div><div class="stat-l">Días este mes</div></div>
      <div class="stat-card"><div class="stat-n">${avg}</div><div class="stat-l">Promedio asistentes</div></div>
      <div class="stat-card"><div class="stat-n">${sinNadie}</div><div class="stat-l">Días sin nadie</div></div>`;
    const as=document.getElementById('attendStats');as.innerHTML='';
    [...PERSONS].sort((a,b)=>cnt[b]-cnt[a]).forEach(p=>{
      const pct=totalDays?Math.round(cnt[p]/totalDays*100):0;
      as.innerHTML+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px">
        <div style="width:34px;height:34px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-weight:900;color:${COLORS[p]}">${PI[p]}</div>
        <div style="flex:1"><div style="font-size:.83rem;font-weight:700">${p}${p===ME?' ●':''}</div>
          <div style="background:var(--border);border-radius:4px;height:4px;margin-top:6px"><div style="background:${COLORS[p]};border-radius:4px;height:4px;width:${pct}%"></div></div>
        </div>
        <div style="font-size:.88rem;font-weight:800;color:${COLORS[p]}">${cnt[p]} días</div>
      </div>`;
    });
    // ── Ranking fuerza relativa ──
    // Need pesos loaded for all persons
    await Promise.all(PERSONS.map(p=>loadPesos(p)));
    const ratios=PERSONS.map(p=>({p,r:getStrengthRatio(p)})).filter(x=>x.r!==null).sort((a,b)=>b.r-a.r);
    if(ratios.length){
      let rhtml='<div class="section-title" style="margin-top:20px">💪 Fuerza relativa</div>';
      rhtml+='<div style="font-size:.62rem;color:var(--muted);margin-bottom:10px">Promedio de peso levantado ÷ peso corporal</div>';
      ratios.forEach(({p,r},i)=>{
        const comment=i<STRENGTH_COMMENTS.length?STRENGTH_COMMENTS[i]:'';
        const isMe=p===ME;
        rhtml+=`<div style="background:var(--card);border:1px solid ${isMe?COLORS[p]:' var(--border)'};border-radius:12px;padding:12px 14px;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:${comment?'8':'0'}px">
            <div style="width:26px;text-align:center;font-size:.75rem;font-weight:900;color:var(--muted)">${i+1}°</div>
            <div style="width:34px;height:34px;border-radius:50%;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-weight:900;color:${COLORS[p]}">${PI[p]}</div>
            <div style="flex:1"><div style="font-size:.83rem;font-weight:700">${p}${isMe?' ●':''}</div></div>
            <div style="font-size:.95rem;font-weight:900;color:${COLORS[p]}">${r.toFixed(2)}x</div>
          </div>
          ${comment?`<div style="font-size:.68rem;color:var(--muted);padding-left:72px;line-height:1.4">${comment}</div>`:''}
        </div>`;
      });
      as.innerHTML+=rhtml;
    }
  }catch(e){document.getElementById('statsGrid').innerHTML='<div style="color:var(--muted);grid-column:1/-1;text-align:center;padding:20px">Error</div>';}
}

// ── NAV ───────────────────────────────────────────────────
function showPage(id){
  ['restView','gymView','pageRutina','pageHistorial','pageStats'].forEach(p=>document.getElementById(p).classList.add('hidden'));
  if(id==='hoy'){
    if(isRest){document.getElementById('restView').classList.remove('hidden');buildRestDay();}
    else{document.getElementById('gymView').classList.remove('hidden');buildWeekStrip();buildAttendance();buildDayExList();}
  }else{
    document.getElementById(id).classList.remove('hidden');
    if(id==='pageRutina')buildRutinaPage();
    if(id==='pageHistorial')buildHistPage();
    if(id==='pageStats')buildStatsPage();
  }
}
function switchPage(el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');showPage(el.dataset.page);
}

// ── BOOT ──────────────────────────────────────────────────
buildLogin();
if(ME){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('navBar').classList.remove('hidden');
  initApp();
}
</script>
